name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Run tests
        run: dotnet test tests/

  deploy-pages:
    name: Deploy Pages
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install wasm workload
        run: dotnet workload install wasm-tools

      - name: Build results viewer
        run: dotnet publish src-viewer/ -c Release -o dist/viewer/

      - uses: actions/configure-pages@v5

      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Merge viewer into site
        run: mkdir -p _site/viewer && cp -r dist/viewer/wwwroot/. _site/viewer/

      - uses: actions/upload-pages-artifact@v3

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
